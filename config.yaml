# Pawang — Multi-Agent Gateway Configuration
# Satu file YAML, bukan 6,798-line JSON :)

gateway:
  host: 0.0.0.0
  port: 18800
  log_level: info

providers:
  anthropic:
    base_url: https://api.anthropic.com/v1
    api_key: ${ANTHROPIC_API_KEY}
    api_format: anthropic
    models:
      - claude-opus-4-20250514
      - claude-sonnet-4-20250514
      - claude-haiku-4-5-20250514

  deepseek:
    base_url: https://api.deepseek.com/v1
    api_key: ${DEEPSEEK_API_KEY}
    api_format: openai
    models:
      - deepseek-chat
      - deepseek-reasoner

  openai:
    base_url: https://api.openai.com/v1
    api_key: ${OPENAI_API_KEY}
    api_format: openai
    models:
      - gpt-5.4
      - gpt-5.4-mini
      - gpt-5.4-nano
      - gpt-5.2
      - gpt-5-mini
      - gpt-4.1
      - gpt-4.1-mini
      - gpt-4o
      - o3
      - o4-mini

  google:
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key: ${GEMINI_API_KEY}
    api_format: gemini
    models:
      - gemini-2.5-pro
      - gemini-2.5-flash
      - gemini-2.0-flash

  modelstudio:
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    api_key: ${MODELSTUDIO_API_KEY}
    api_format: openai
    models:
      - qwen-max
      - qwen-plus
      - qwen-turbo
      - qwen-long
      - qwen2.5-72b-instruct
      - qwen2.5-coder-32b-instruct

  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key: ${OPENROUTER_API_KEY}
    api_format: openai
    models: []  # dynamic, fetched from API

  zai:
    base_url: https://api.z.ai/api/paas/v4
    api_key: ${ZAI_API_KEY}
    api_format: openai
    models:
      - glm-5
      - glm-5-turbo
      - glm-4.7
      - glm-4.5

  kieai:
    base_url: https://api.kie.ai/api/v1
    api_key: ${KIEAI_API_KEY}
    api_format: openai
    models:
      - flux-1.1-pro  # image generation

  sumopod:
    base_url: https://ai.sumopod.com/v1
    api_key: ${SUMOPOD_API_KEY}
    api_format: openai
    models:
      - deepseek-v3-2
      - deepseek-r1
      - gpt-5.2
      - gpt-5.2-codex
      - gpt-5.1
      - gpt-5.1-codex
      - gpt-5.1-codex-mini
      - gpt-5
      - gpt-5-mini
      - gpt-5-nano
      - gpt-4.1
      - gpt-4.1-mini
      - gpt-4.1-nano
      - gpt-4o
      - gpt-4o-mini
      - gpt-image-1
      - gemini/gemini-3-pro-preview
      - gemini/gemini-3-flash-preview
      - gemini/gemini-2.5-pro
      - gemini/gemini-2.5-flash
      - gemini/gemini-2.5-flash-lite
      - gemini/gemini-2.0-flash
      - gemini/gemini-2.0-flash-lite
      - claude-haiku-4-5
      - kimi-k2
      - kimi-k2-thinking
      - kimi-k2-5-260127
      - glm-5.1
      - glm-5
      - glm-5-code
      - glm-5-turbo
      - glm-4-7
      - seed-2-0-pro
      - seed-2-0-pro-free
      - seed-2-0-lite
      - seed-2-0-lite-free
      - seed-2-0-mini
      - seed-2-0-mini-free
      - seed-1-8
      - text-embedding-3-large
      - text-embedding-3-small

agents:
  - id: agent1
    name: Wulan
    model: gpt-5.4
    provider: openai
    fallbacks:
      - openai/gpt-4.1
      - zai/glm-5-turbo
      - deepseek/deepseek-chat
    system_prompt_file: prompts/agent1.md
    channels: [telegram]
    max_context_tokens: 128000
    temperature: 0.7

  - id: agent2
    name: Rani
    model: gpt-4.1-mini
    provider: openai
    fallbacks:
      - zai/glm-5
      - deepseek/deepseek-chat
    system_prompt_file: prompts/agent2.md
    channels: []
    max_context_tokens: 128000
    temperature: 0.9

  - id: agent3
    name: Dewi
    model: glm-5
    provider: zai
    fallbacks:
      - deepseek/deepseek-reasoner
      - sumopod/kimi-k2-thinking
      - deepseek/deepseek-chat
    system_prompt_file: prompts/agent3.md
    channels: []
    max_context_tokens: 128000
    temperature: 0.3

  - id: agent4
    name: Bima
    model: deepseek-chat
    provider: deepseek
    fallbacks:
      - openai/gpt-5.4
      - zai/glm-5-turbo
    system_prompt_file: prompts/agent4.md
    channels: []
    max_context_tokens: 128000
    temperature: 0.5

  # Backup / Failover agents
  - id: agent5
    name: Wulan B
    model: gpt-4.1-mini
    provider: openai
    fallbacks:
      - zai/glm-5-turbo
      - deepseek/deepseek-chat
    system_prompt_file: prompts/agent5.md
    channels: []
    max_context_tokens: 128000
    temperature: 0.7

  - id: agent6
    name: Rani B
    model: glm-5
    provider: zai
    fallbacks:
      - openai/gpt-4.1-mini
      - deepseek/deepseek-chat
    system_prompt_file: prompts/agent6.md
    channels: []
    max_context_tokens: 1000000
    temperature: 0.9

  - id: agent7
    name: Dewi B
    model: glm-4.7
    provider: zai
    fallbacks:
      - deepseek/deepseek-reasoner
      - deepseek/deepseek-chat
    system_prompt_file: prompts/agent7.md
    channels: []
    max_context_tokens: 1000000
    temperature: 0.3

  - id: agent8
    name: Bima B
    model: glm-5-turbo
    provider: zai
    fallbacks:
      - zai/glm-5
      - deepseek/deepseek-chat
    system_prompt_file: prompts/agent8.md
    channels: []
    max_context_tokens: 128000
    temperature: 0.5

  - id: agent9
    name: Claudia
    model: claude-opus-4-20250514
    provider: anthropic
    system_prompt_file: prompts/agent9.md
    channels: []
    max_context_tokens: 200000
    temperature: 0.5
    # Delegation target — project management in /root/pawang/projects/

  - id: agent10
    name: Claude Code
    model: claude-opus-4-20250514
    provider: anthropic
    system_prompt_file: prompts/agent10.md
    channels: []
    max_context_tokens: 200000
    temperature: 0.5
    # Direct CLI access — browses ~/.claude/projects/ sessions

channels:
  telegram:
    token: ${TELEGRAM_BOT_TOKEN}
    allowed_users: []  # empty = semua boleh
    default_agent: agent1
    admin_chat_id: "613802669"

health:
  check_interval: 60
  auto_failover: true
  fallback_chain:
    - [agent1, agent5]  # agent1 down -> agent5
    - [agent2, agent6]
    - [agent3, agent7]
    - [agent4, agent8]

scheduler:
  enabled: true
  balance_alert_interval: 21600   # 6 jam
  health_report_interval: 300     # 5 menit
  db_cleanup_interval: 86400      # 24 jam

panel:
  enabled: true
  port: 18801
  auth:
    username: admin
    password: ${PANEL_PASSWORD}

smart_routing:
  enabled: true
  cheap_provider: openai
  cheap_model: gpt-5.4-mini

session_timeout: 14400  # 4 hours idle = auto-reset
